<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            .row {
                display: flex;
                flex-direction: row;
                justify-content: center;
                align-items: flex-start;
            }

            .row2 {
                display: flex;
                flex-direction: row;
                justify-content: center;
                align-items: flex-start;
                gap: 330px;
            }

            .checklist-table {
                width: 92%;
                margin: 12px auto;
                border-collapse: collapse;
                background: transparent;
            }

            .checklist-table thead th {
                text-align: left;
                padding: 10px 12px;
                color: #ffffff;
                font-weight: 700;
                border-bottom: 1px solid rgba(255,255,255,0.12);
            }

            .checklist-table td {
                padding: 8px 12px;
                color: #ffffff;
                vertical-align: middle;
                border-bottom: 1px solid rgba(255,255,255,0.06);
            }

            .checklist-table input[type="date"],
            .checklist-table input[type="number"] {
                background: #ffffff;
                border: none;
                padding: 6px 8px;
                border-radius: 3px;
            }

            .checklist-table input[type="checkbox"] {
                transform: scale(1.15);
            }

            .extra-control {
                display: flex;
                gap: 6px;
                align-items: center;
                justify-content: center;
            }

            .extra-control button {
                padding: 4px 8px;
                border-radius: 4px;
            }

            .extra-value {
                min-width: 26px;
                text-align: center;
                display: inline-block;
                font-weight: 600;
                color: #fff;
                padding: 4px 6px;
                border-radius: 4px;
                transition: all 0.3s ease;
            }

            .extra-value.lit {
                background-color: rgba(255, 255, 255, 0.2);
                box-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
            }

            .extra-value.gold {
                background-color: #FFD700;
                color: #000;
                box-shadow: 0 0 12px rgba(255, 215, 0, 0.6);
            }
.extra-value.diamond {
    background: linear-gradient(45deg, #b9f2ff, #e0ffff);
    color: #000;
    box-shadow: 0 0 16px rgba(185,242,255,0.9);
}
.extra-value.legend {
    background: linear-gradient(45deg, #ff00cc, #3333ff);
    color: #fff;
    box-shadow: 0 0 20px rgba(255,0,204,0.8);
}
.extra-value.platinum {
  background: linear-gradient(45deg, #e5e4e2, #ffffff);
  color: #000;
  box-shadow: 0 0 14px rgba(255,255,255,0.8);
}
            .total-control {
                display: flex;
                gap: 6px;
                align-items: center;
                justify-content: center;
            }
            .total-control button {
                padding: 4px 8px;
                border-radius: 4px;
            }
            .total-value {
                min-width: 26px;
                text-align: center;
                display: inline-block;
                font-weight: 600;
                color: #fff;
            }
.celebration {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #00ffcc;
  color: #000;
  padding: 12px 18px;
  border-radius: 8px;
  font-weight: bold;
  box-shadow: 0 0 15px rgba(0,255,200,0.7);
  animation: popIn 1s ease, fadeOut 1s ease 3.5s forwards;
  z-index: 9999;
}

@keyframes popIn {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes fadeOut {
  to { opacity: 0; transform: translateY(-20px); }
}

.confetti {
  position: fixed;
  width: 9px;
  height: 9px;
  background: red;
  top: 0;
  animation: fall 8s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
    opacity: 0;
  }
}
.task-complete {
  animation: glow 0.5s ease;
}

@keyframes glow {
  0% { box-shadow: 0 0 0px transparent; }
  50% { box-shadow: 0 0 15px #00ffcc; }
  100% { box-shadow: 0 0 0px transparent; }
}
        </style>

<div style="display:flex; align-items:center; background-color:#B30000; width:1250px; height:45px; margin-left:14px; margin-top: -8px;">

 <a href="Life App Home Red.html"  style="text-decoration:none;">

        <div class="row2" style="margin-top:20px;">
            <div class="column" style="background-color:#B30000; width:1250px; margin-left:12px; height:505px;">
                <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 16px;">
                    <h2 style="text-align:left; color:#fff; margin:0; padding:0;">Daily Checklist</h2>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <input id="newTaskName" placeholder="New task name" style="padding:4px 8px; border-radius:4px; color: #B30000">

                            <button id="daycount-decr" style="padding:4px 8px; border-radius:4px;">-</button>
                            <span id="dayNumberInline" style="min-width:24px; text-align:center; display:inline-block; font-weight:700;">1</span>
                            <button id="daycount-incr" style="padding:4px 8px; border-radius:4px;">+</button>
                        </div>

                    <thead>
                        <tr>
                            <th>Task</th>

                            <th style="text-align:center;">Done</th>

<tbody></tbody>

<script src="XP.js"></script>

<script>
function celebrate(message) {
  const old = document.querySelector(".celebration");
  if (old) old.remove();

  const pop = document.createElement("div");
  pop.className = "celebration";
  pop.textContent = message;
  document.body.appendChild(pop);

  setTimeout(() => pop.remove(), 2500);

  for (let i = 0; i < 15; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;
    c.style.animationDuration = (1.5 + Math.random()) + "s";
    document.body.appendChild(c);

    setTimeout(() => c.remove(), 2000);
  }
}
function notify(message) {
  const old = document.querySelector(".celebration");
  if (old) old.remove();

  const pop = document.createElement("div");
  pop.className = "celebration";
  pop.textContent = message;
  document.body.appendChild(pop);

  setTimeout(() => pop.remove(), 2500);
}
(function () {
  const pageKey = (location.pathname.split('/').pop() || 'page')
    .split('.')[0]
    .replace(/\W+/g, '-');

  const STORAGE_PREFIX = 'checklist_' + pageKey;
  const sk = (k) => STORAGE_PREFIX + ':' + k;

  const storedDay = parseInt(localStorage.getItem(sk('day')), 10);
  const storedDayCount = parseInt(localStorage.getItem(sk('dayCount')), 10);

  let day = (!isNaN(storedDay) && storedDay >= 1) ? storedDay : 1;
  let dayCount = (!isNaN(storedDayCount) && storedDayCount >= 1) ? storedDayCount : 1;

  const dayNumber = document.getElementById('dayNumber');
  const dayNumberInline = document.getElementById('dayNumberInline');

  const dayIncr = document.getElementById('day-incr');
  const dayDecr = document.getElementById('day-decr');
  const dayCountIncr = document.getElementById('daycount-incr');
  const dayCountDecr = document.getElementById('daycount-decr');

  function updateDay() {
    if (dayNumber) dayNumber.textContent = day;
    localStorage.setItem(sk('day'), String(day));
  }

  function updateDayCount() {
    if (dayNumberInline) dayNumberInline.textContent = dayCount;
    localStorage.setItem(sk('dayCount'), String(dayCount));
  }

if (dayIncr) dayIncr.addEventListener('click', () => {
  day++;
  updateDay();
});
  if (dayDecr) dayDecr.addEventListener('click', () => { if (day > 1) day--; updateDay(); });

  if (dayCountIncr) dayCountIncr.addEventListener('click', () => { dayCount++; updateDayCount(); });
  if (dayCountDecr) dayCountDecr.addEventListener('click', () => { if (dayCount > 1) dayCount--; updateDayCount(); });

  updateDay();
  updateDayCount();

function getExtraMax() {
  const keys = JSON.parse(localStorage.getItem(sk('keys')) || '[]');
  let max = 0;

  keys.forEach(k => {
    const raw = localStorage.getItem(sk('row_' + k));
    if (!raw) return;

    try {
      const data = JSON.parse(raw);

      const v = Number(data.extra);
      if (!isNaN(v) && v > max) {
        max = v;
      }
    } catch (e) {}
  });

  return max;
}


  function slugify(name) {
    return name.toLowerCase().trim()
      .replace(/[^a-z0-9]+/g, '_')
      .replace(/^_+|_+$/g, '') || ('task_' + Date.now());
  }

  function setExtraStyles(extraEl, v) {
    if (!extraEl) return;
    extraEl.classList.remove('lit', 'gold', 'platinum', 'diamond', 'legend');

    if (v >= 10) extraEl.classList.add('legend');
    else if (v >= 7) extraEl.classList.add('diamond');
    else if (v >= 5) extraEl.classList.add('platinum');
    else if (v >= 3) extraEl.classList.add('gold');
    else if (v >= 1) extraEl.classList.add('lit');
  }

  function saveRow(key) {
    try {
      const startEl = document.querySelector(`[name="start_${key}"]`);
      if (!startEl) return;

      const tr = startEl.closest('tr');
      const endEl = tr.querySelector(`[name="end_${key}"]`);
      const doneEl = tr.querySelector(`[name="done_${key}"]`);
      const voidEl = tr.querySelector(`[name="void_${key}"]`);

      const extraEl = tr.querySelector('.extra-value');
      const totalEl = tr.querySelector('.total-value');
      const voidNoteEl = tr.querySelector('.void-note');

      const start = startEl.value || '';
      const end = (endEl && endEl.value) || '';
      const done = !!(doneEl && doneEl.checked);
      const voidDay = !!(voidEl && voidEl.checked);

      const extra = parseInt((extraEl && extraEl.textContent) || '0', 10) || 0;
      const total = parseInt((totalEl && totalEl.textContent) || '0', 10) || 0;

      const voidMessage = (voidNoteEl && voidNoteEl.textContent) ? voidNoteEl.textContent.trim() : '';

      let existing = null;
      try { existing = JSON.parse(localStorage.getItem(sk('row_' + key))); } catch (e) { existing = null; }

      const payload = Object.assign(
        {},
        existing && existing.displayName ? { displayName: existing.displayName } : {},
        { start, end, extra, total, done, voidDay, voidMessage }
      );

      localStorage.setItem(sk('row_' + key), JSON.stringify(payload));
    } catch (e) {}
  }

  function restoreRow(key) {
    try {
      const raw = localStorage.getItem(sk('row_' + key));
      if (!raw) return;

      const data = JSON.parse(raw);
      const startEl = document.querySelector(`[name="start_${key}"]`);
      if (!startEl) return;

      const tr = startEl.closest('tr');
      const endEl = tr.querySelector(`[name="end_${key}"]`);
      const doneEl = tr.querySelector(`[name="done_${key}"]`);
      const voidEl = tr.querySelector(`[name="void_${key}"]`);

      const extraEl = tr.querySelector('.extra-value');
      const totalEl = tr.querySelector('.total-value');
      const voidNoteEl = tr.querySelector('.void-note');

      if (data.start != null) startEl.value = data.start;
      if (endEl && data.end != null) endEl.value = data.end;
      if (doneEl) doneEl.checked = !!data.done;
      if (voidEl) voidEl.checked = !!data.voidDay;

      if (extraEl) {
        const v = (typeof data.extra === 'number') ? data.extra : (parseInt(data.extra, 10) || 0);
        extraEl.textContent = String(v);
        setExtraStyles(extraEl, v);
      }

      if (totalEl) {
        const v = (typeof data.total === 'number') ? data.total : (parseInt(data.total, 10) || 0);
        totalEl.textContent = String(v);
      }

      if (voidNoteEl) voidNoteEl.textContent = data.voidMessage ? data.voidMessage : '';
    } catch (e) {}
  }

  function createRowElement(displayName, key) {
    const tbody = document.querySelector('.checklist-table tbody');
    if (!tbody) return;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="task-name">${displayName}</span> <span class="void-note"></span></td>
      <td><input type="date" name="start_${key}"></td>
      <td><input type="date" name="end_${key}"></td>
      <td style="text-align:center;"><input type="checkbox" name="done_${key}"></td>
      <td>
        <div class="extra-control">
          <button type="button" class="extra-decr">-</button>
          <span class="extra-value">0</span>
          <button type="button" class="extra-incr">+</button>
        </div>
      </td>
      <td>
        <div class="total-control">
          <button type="button" class="total-decr">-</button>
          <span class="total-value">0</span>
          <button type="button" class="total-incr">+</button>
        </div>
      </td>
      <td style="text-align:center;"><input type="checkbox" name="void_${key}"></td>
    `;
    tbody.appendChild(tr);

    const startEl = tr.querySelector(`[name="start_${key}"]`);
    const endEl = tr.querySelector(`[name="end_${key}"]`);
    const doneEl = tr.querySelector(`[name="done_${key}"]`);
    const voidEl = tr.querySelector(`[name="void_${key}"]`);

    if (startEl) startEl.addEventListener('change', () => saveRow(key));
    if (endEl) endEl.addEventListener('change', () => saveRow(key));
    if (doneEl) {
      doneEl.addEventListener('change', () => {
        const row = doneEl.closest("tr");
        const totalVal = row.querySelector('.total-value');
        if (doneEl.checked) {
          addXP(20, "Task Completed");
          row.classList.add("task-complete");
          celebrate("✅ Task Completed!");
          if (totalVal) {
            let v = parseInt(totalVal.textContent || '0', 10) || 0;
            v++;
            totalVal.textContent = String(v);
          }
          setTimeout(() => row.classList.remove("task-complete"), 600);
        } else {
          addXP(-5, "Task Unchecked");
        }
        checkPerfectDay();
        saveRow(key);
      });
    }

    if (voidEl) {
      voidEl.addEventListener('change', () => {
        const voidNoteEl = tr.querySelector('.void-note');
        if (voidEl.checked) {
          const msg = prompt('Why are you voiding the day (optional):', voidNoteEl ? voidNoteEl.textContent : '') || '';
          if (voidNoteEl) voidNoteEl.textContent = msg;
        } else {
          if (voidNoteEl) voidNoteEl.textContent = '';
        }
        saveRow(key);
      });
    }

    restoreRow(key);
  }

  const startInputs = Array.from(document.querySelectorAll('input[name^="start_"]'));
  const staticKeys = startInputs.map(i => i.name.replace(/^start_/, ''));

  const storedKeys = JSON.parse(localStorage.getItem(sk('keys')) || '[]');

  storedKeys.forEach(k => {
    if (staticKeys.includes(k)) return;

    let displayName = k;
    try {
      const raw = localStorage.getItem(sk('row_' + k));
      if (raw) {
        const d = JSON.parse(raw);
        if (d && d.displayName) displayName = d.displayName;
      }
    } catch (e) {}

    createRowElement(displayName, k);
  });

  staticKeys.forEach(key => {
    restoreRow(key);

    const startEl = document.querySelector(`[name="start_${key}"]`);
    if (!startEl) return;
    const tr = startEl.closest('tr');

    const endEl = tr.querySelector(`[name="end_${key}"]`);
    const doneEl = tr.querySelector(`[name="done_${key}"]`);
    const voidEl = tr.querySelector(`[name="void_${key}"]`);

    if (startEl) startEl.addEventListener('change', () => saveRow(key));
    if (endEl) endEl.addEventListener('change', () => saveRow(key));
    if (doneEl) doneEl.addEventListener('change', () => saveRow(key));

    if (voidEl) {
      voidEl.addEventListener('change', () => {
        const voidNoteEl = tr.querySelector('.void-note');
        if (voidEl.checked) {
          const msg = prompt('Why are you voiding the day (optional):', voidNoteEl ? voidNoteEl.textContent : '') || '';
          if (voidNoteEl) voidNoteEl.textContent = msg;
        } else {
          if (voidNoteEl) voidNoteEl.textContent = '';
        }
        saveRow(key);
      });
    }
  });

  const tbody = document.querySelector('.checklist-table tbody');
  if (tbody) {
    tbody.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;

      const tr = btn.closest('tr');
      if (!tr) return;

      const startInput = tr.querySelector('input[name^="start_"]');
      if (!startInput) return;

      const key = startInput.name.replace(/^start_/, '');

if (btn.classList.contains('extra-incr')) {
  addXP(5, "Extra Effort");

  const extraEl = tr.querySelector('.extra-value');
  let ev = parseInt((extraEl && extraEl.textContent) || '0', 10) || 0;
  ev++;

  if (extraEl) extraEl.textContent = String(ev);
  setExtraStyles(extraEl, ev);

  const totalEl = tr.querySelector('.total-value');
  let tv = parseInt((totalEl && totalEl.textContent) || '0', 10) || 0;
  tv++;

  if (totalEl) totalEl.textContent = String(tv);

  if (ev === 5) celebrate("🏆 5 Extra Days! You're on fire!");
  if (ev === 7) celebrate("🏆 7 Extra Days is crazy!");
  if (ev === 10) celebrate("👑 Legendary!");
  if (ev === 15) celebrate("👑 Unheard of!");
  if (ev === 20) celebrate("👑 HOW! You are the greatest!");

saveRow(key);
updateTrophies();

requestAnimationFrame(() => {
  updateTrophies();
});

return;
}

      if (btn.classList.contains('extra-decr')) {
        addXP(-2, "Lost Extra Progress");
        const valEl = tr.querySelector('.extra-value');
        let v = parseInt((valEl && valEl.textContent) || '0', 10) || 0;
        v--;

        if (valEl) valEl.textContent = String(v);
        setExtraStyles(valEl, v);

        if (v === -3) notify("⚠️ You need to catch up 3 days it's comeback time! You got this 💪");

        saveRow(key);
        setTimeout(() => {
          if (typeof updateTrophies === 'function') updateTrophies();
        }, 0);
        return;
      }

      if (btn.classList.contains('total-incr')) {
        addXP(10, "Progress Increased");
        const valEl = tr.querySelector('.total-value');
        let v = parseInt((valEl && valEl.textContent) || '0', 10) || 0;
        v++;
        if (valEl) valEl.textContent = String(v);
        saveRow(key);
        return;
      }

      if (btn.classList.contains('total-decr')) {
        addXP(-5, "Progress Lost");
        const valEl = tr.querySelector('.total-value');
        let v = parseInt((valEl && valEl.textContent) || '0', 10) || 0;
        v--;
        if (valEl) valEl.textContent = String(v);
        saveRow(key);
        return;
      }
    });
  }

  const addBtn = document.getElementById('addTaskBtn');
  const removeBtn = document.getElementById('removeTaskBtn');
  const nameInput = document.getElementById('newTaskName');

  if (addBtn) {
    addBtn.addEventListener('click', () => {
      addXP(10, "Task Added");
      const name = ((nameInput && nameInput.value) || '').trim();
      if (!name) return;

      let key = slugify(name);

      const allKeys = Array.from(document.querySelectorAll('input[name^="start_"]'))
        .map(i => i.name.replace(/^start_/, ''));

      if (allKeys.includes(key)) key = `${key}_${Date.now()}`;

      createRowElement(name, key);

let sKeys = [];
try {
  sKeys = JSON.parse(localStorage.getItem(sk('keys'))) || [];
} catch (e) {
  sKeys = [];
}
      sKeys.push(key);
      localStorage.setItem(sk('keys'), JSON.stringify(sKeys));

      localStorage.setItem(sk('row_' + key), JSON.stringify({
        start: '',
        end: '',
        extra: 0,
        total: 0,
        done: false,
        voidDay: false,
        voidMessage: '',
        displayName: name
      }));

      if (nameInput) nameInput.value = '';
    });
  }

  if (removeBtn) {
    removeBtn.addEventListener('click', () => {
      const name = ((nameInput && nameInput.value) || '').trim();
      const sKeys = JSON.parse(localStorage.getItem(sk('keys')) || '[]');

      let removed = false;

      if (name) {
        const rows = Array.from(document.querySelectorAll('.checklist-table tbody tr'));
        for (const tr of rows) {
          const taskNameEl = tr.querySelector('.task-name');
          const label = (taskNameEl ? taskNameEl.textContent : tr.querySelector('td')?.textContent || '').trim();

          if (label.toLowerCase() === name.toLowerCase()) {
            const startInput = tr.querySelector('input[name^="start_"]');
            if (startInput) {
              const key = startInput.name.replace(/^start_/, '');
              localStorage.removeItem(sk('row_' + key));
              const idx = sKeys.indexOf(key);
              if (idx !== -1) sKeys.splice(idx, 1);
            }
            tr.remove();
            removed = true;
            break;
          }
        }
      } else {
        if (sKeys.length > 0) {
          sKeys.forEach(key => {
            localStorage.removeItem(sk('row_' + key));
            const el = document.querySelector(`input[name="start_${key}"]`);
            if (el) el.closest('tr').remove();
          });
          sKeys.length = 0;
          removed = true;
        }
      }

      localStorage.setItem(sk('keys'), JSON.stringify(sKeys));
      if (removed && nameInput) nameInput.value = '';
    });
  }
})();

let perfectDayAwarded = localStorage.getItem("perfectDay") === "true";
let perfectDayMaxAwarded = localStorage.getItem("perfectDayMax") === "true";

function checkPerfectDay() {
  const tasks = document.querySelectorAll('input[name^="done_"]');
  if (tasks.length === 0) return;

  let totalTasks = tasks.length;
  let completedTasks = 0;

  tasks.forEach(t => {
    if (t.checked) completedTasks++;
  });

  if (completedTasks === totalTasks && !perfectDayAwarded) {
    localStorage.setItem("perfectDay", "true");
    let xpReward = 0;

    if (totalTasks >= 7) {
      xpReward = 100;
    } else if (totalTasks >= 5) {
      xpReward = 50;
    } else if (totalTasks >= 3) {
      xpReward = 30;
    } else if (totalTasks >= 1) {
      xpReward = 15;
    }

    addXP(xpReward, "Perfect Day 🔥");
    perfectDayAwarded = true;
    celebrate(`🔥 PERFECT DAY! +${xpReward} XP`);

    if (totalTasks >= 5 && !perfectDayMaxAwarded) {
      localStorage.setItem("perfectDayMax", "true");
      perfectDayMaxAwarded = true;
    }
  }

  if (completedTasks < totalTasks) {
    perfectDayAwarded = false;
    localStorage.setItem("perfectDay", "false");
    perfectDayMaxAwarded = false;
    localStorage.setItem("perfectDayMax", "false");
  }
}

setTimeout(updateTrophies, 500);
