.celebration {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #00ffcc;
  color: #000;
  padding: 12px 18px;
  border-radius: 8px;
  font-weight: bold;
  box-shadow: 0 0 15px rgba(0,255,200,0.7);
  animation: popIn 1s ease, fadeOut 1s ease 3.5s forwards;
  z-index: 9999;
}

@keyframes popIn {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes fadeOut {
  to { opacity: 0; transform: translateY(-20px); }
}

.confetti {
  position: fixed;
  width: 9px;
  height: 9px;
  background: red;
  top: 0;
  animation: fall 8s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
    opacity: 0;
  }
}
.task-complete {
  animation: glow 0.5s ease;
}

@keyframes glow {
  0% { box-shadow: 0 0 0px transparent; }
  50% { box-shadow: 0 0 15px #00ffcc; }
  100% { box-shadow: 0 0 0px transparent; }
}

<script>

const budgetKey = "lifeBudget";

function celebrate(message) {
  const old = document.querySelector(".celebration");
  if (old) old.remove();

  const pop = document.createElement("div");
  pop.className = "celebration";
  pop.textContent = message;
  document.body.appendChild(pop);

  setTimeout(() => pop.remove(), 2500);

  for (let i = 0; i < 15; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;
    c.style.animationDuration = (1.5 + Math.random()) + "s";
    document.body.appendChild(c);

    setTimeout(() => c.remove(), 2000);
  }
}
function notify(message) {
  const old = document.querySelector(".celebration");
  if (old) old.remove();

  const pop = document.createElement("div");
  pop.className = "celebration";
  pop.textContent = message;
  document.body.appendChild(pop);

  setTimeout(() => pop.remove(), 2500);
}

let data = JSON.parse(localStorage.getItem("lifeBudget")) || []

let lastBalance = 0;

render()

function addTransaction(){

let name = document.getElementById("name").value
let amount = Number(document.getElementById("amount").value)
let type = document.getElementById("type").value
let category = document.getElementById("category").value

if(name=="" || amount==0) return

data.push({
name,
amount,
type,
category
})

if(type === "Income"){
  addXP(20, "Income Added 💰")
} else {
  addXP(-10, "Expense Tracked 💸")
}

if(category === "Savings"){
  addXP(15, "Saving Money 🏦")
}

save()
render()
checkBudgetHealth()
checkMilestones()
}

function render(){

let table = document.getElementById("table")
table.innerHTML=""

let Income=0
let Expense=0
let runningTotal=0

data.forEach((t,i)=>{

if(t.type=="Income"){
Income+=t.amount
runningTotal+=t.amount
}else{
Expense+=t.amount
runningTotal-=t.amount
}

let row=document.createElement("tr")
row.innerHTML = `
<td><input type="checkbox" class="select-item" data-index="${i}"></td>
<td>${t.name}</td>
<td>${t.amount}</td>
<td>${t.type}</td>
<td>${t.category}</td>
<td>${runningTotal}</td>
`
table.appendChild(row)

})


document.getElementById("Income").innerText=Income
document.getElementById("Expense").innerText=Expense
document.getElementById("Balance").innerText=Income-Expense

let currentBalance = Income - Expense;
if(currentBalance < 0 && lastBalance < 0 && currentBalance > lastBalance){
  notify("👏 Doing better! Keep going!");
}lastBalance = currentBalance;
}

function removeItem(i){

data.splice(i,1)

save()
render()

}
function clearAll(){

let checkboxes = document.querySelectorAll(".select-item")

data = data.filter((_, index) => {
    return !checkboxes[index].checked
})

save()
render()

}
function save(){

localStorage.setItem("lifeBudget",JSON.stringify(data))

}

function showStats(){

let stats={}
let html=""

data.forEach(t=>{

if(t.type=="Expense"){

if(!stats[t.category]){
stats[t.category]=0
}

stats[t.category]+=t.amount

}

})

for(let c in stats){

html+=`<p>${c}: ${stats[c]}</p>`

}

document.getElementById("statsContent").innerHTML=html
document.getElementById("statsBox").style.display="block"

}

function checkBudgetHealth(){

let Income = 0
let Expense = 0

data.forEach(t=>{
  if(t.type=="Income") Income += t.amount
  else Expense += t.amount
})

let Balance = Income - Expense

if(Balance > 0){
  addXP(25, "Positive Balance 📈")
}

if(Balance >= 100){
  addXP(30)
  celebrate("🏆Over 100. Strong savings!")
}

if(Balance >= 300){
  addXP(100)
  celebrate("👑Money Master!")
}

if(Balance < 0 && Balance < lastBalance){
  addXP(-20)
  notify("Overspending!")
}
}
</script>
