<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LifeSync Budget Stats</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #fff;
  color: white;
}

.header {
  display: flex;
  align-items: center;
  background: #B30000;
  height: 30px;
  padding: 0 15px;
}

.header h1 {
  flex: 1;
  text-align: center;
  margin: 0;
  font-weight: normal;
}

.container {
  color: #fff;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 10px;
}

.big {
  font-size: 28px;
  font-weight: bold;
  margin: 10px 0;
}

canvas {
  width: 100% !important;
  height: 300px !important;
}
</style>
</head>

<body>

<div style="display:flex; align-items:center; background-color:#B30000; width:1250px; height:45px; margin-left:15px;">

  <div style="color:white; margin-left:10px; width:200px;">
    <div style="font-size:14px;">Level <span id="level">1</span></div>
    
    <div style="background:#ccc; width:180px; height:8px; border-radius:5px;">
      <div id="xpBar" style="background:#00ffcc; height:8px; width:0%; border-radius:5px;"></div>
    </div>

    <div style="font-size:10px;">
      <span id="xp">0</span> / <span id="xpNeeded">100</span> XP
    </div>
  </div>

 <a href="Life App Home Red.html"  style="text-decoration:none;">
  <h1 style="flex-grow:1; text-align:center; color:#fff; font-size:30px; margin:0;font-weight: normal; margin-left: 349px; margin-right: 353px">
    LifeSync 
  </h1>
</a>
  
  <div style="display:flex; gap:20px; margin-right:48px;">
    <a href="Life App Red Account.html"><img src="Cole profile pic.jpg" style="width:38px; height:30px;"></a>
    <a href="Life App Colour Pick.html"><img src="Colour.png" style="width:38px; height:30px;"></a>
    <a href="Life App Stats Dark.html"><img src="Moon.png" style="width:30px; height:30px; margin-top: 1px"></a>
  </div>
</div>

<div style="background:#fff; height:30px;"></div>

<div class="header">
  <p style="font-size:20px; margin:auto;">Budget Tracker Stats</p>
</div>

<div style="background:#B30000; min-height:700px; padding-top:40px;">

<div class="container">

  <div class="card">
    <h3>Income vs Expenses</h3>
    <canvas id="incomeExpenseChart"></canvas>
  </div>

  <div class="card">
    <h3>Spending by Category</h3>
    <canvas id="categoryChart"></canvas>
  </div>

  <div class="card">
    <h3>Balance Trend</h3>
    <canvas id="balanceChart"></canvas>
  </div>

  <div class="card">
    <h3 style="margin-left:230px;">Overview</h3>
    <div id="overview" style="margin-left:230px;"></div>
  </div>

</div>

<script>
Chart.defaults.color = '#fff';

const budgetKey = "lifeBudget";

const transactions = JSON.parse(localStorage.getItem(budgetKey)) || [];

let income = 0;
let expenses = 0;

let categoryTotals = {};
let balanceHistory = [];
let labels = [];

let runningBalance = 0;

transactions.forEach((t, i) => {
  const amount = Number(t.amount);

  if (t.type === "Income") {
    income += amount;
    runningBalance += amount;
  } else {
    expenses += amount;
    runningBalance -= amount;

    categoryTotals[t.category] =
      (categoryTotals[t.category] || 0) + amount;
  }

  balanceHistory.push(runningBalance);
  labels.push(t.name);
});

const balance = income - expenses;

new Chart(document.getElementById('incomeExpenseChart'), {
  type: 'pie',
  data: {
    labels: ['Income', 'Expenses'],
    datasets: [{
      data: [income, expenses]
    }]
  }
});

new Chart(document.getElementById('categoryChart'), {
  type: 'bar',
  data: {
    labels: Object.keys(categoryTotals),
    datasets: [{
      label: 'Spent',
      data: Object.values(categoryTotals)
    }]
  }
});

new Chart(document.getElementById('balanceChart'), {
  type: 'line',
  data: {
    labels: labels,
    datasets: [{
      label: 'Balance',
      data: balanceHistory,
      fill: false
    }]
  }
});

const topCategory = Object.keys(categoryTotals).reduce((a,b)=>
  categoryTotals[a] > categoryTotals[b] ? a : b,
  Object.keys(categoryTotals)[0]
);

document.getElementById('overview').innerHTML = `
  <div class="big">£${balance.toFixed(2)}</div>
  <div>Total Income: £${income.toFixed(2)}</div>
  <div>Total Expenses: £${expenses.toFixed(2)}</div>
  <div>Transactions: ${transactions.length}</div>
  <div>Biggest Spend Category: ${topCategory || 'N/A'}</div>
`;
</script>

<script src="XP.js"></script>

</body>
</html>
