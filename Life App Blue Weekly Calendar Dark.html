<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background-image: url(Black.jpg);
    }
  </style>
<style>
body{
font-family: Arial;
}

.row {
display: flex;
flex-direction: row;
justify-content: center;
align-items: flex-start;
}
.row2 {
display: flex;
flex-direction: row;
justify-content: center;
align-items: flex-start;
gap: 30px;
}

.controls{
text-align:center;
margin-bottom:30px;
margin-top: 5px;
}

.controls input{
padding:8px;
width:200px;
}

.controls select{
padding:8px;
}

.controls button{
padding:8px 12px;
margin-left:5px;
cursor:pointer;
}

.calendar{
display:grid;
grid-template-columns: repeat(7, 1fr);
grid-template-rows: repeat(6, 1fr);
margin-top:-350px;
margin-left:5px;
width:1250px;
height:420px;
background:#f8f8f8;
border:2px solid #ccc;
border-radius:12px;
overflow:hidden;
}

.cell{
border-right:1px solid #d0d0d0;
border-bottom:1px solid #d0d0d0;
padding:4px;
position:relative;
font-size:12px;
}

.cell:nth-child(7n){
border-right:none;
}

.day-label{
position:absolute;
top:2px;
left:4px;
font-size:11px;
color:#888;
letter-spacing:1px;
}

.task{
margin-top:14px;
display:flex;
justify-content:space-between;
font-size:12px;
color:#111;
}

.task button{
background:none;
border:none;
color:#cc0000;
cursor:pointer;
font-size:10px;
}
.celebration {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #00ffcc;
  color: #000;
  padding: 12px 18px;
  border-radius: 8px;
  font-weight: bold;
  box-shadow: 0 0 15px rgba(0,255,200,0.7);
  animation: popIn 1s ease, fadeOut 1s ease 3.5s forwards;
  z-index: 9999;
}

@keyframes popIn {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes fadeOut {
  to { opacity: 0; transform: translateY(-20px); }
}

.confetti {
  position: fixed;
  width: 9px;
  height: 9px;
  background: red;
  top: 0;
  animation: fall 8s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
    opacity: 0;
  }
}
.task-complete {
  animation: glow 0.5s ease;
}

@keyframes glow {
  0% { box-shadow: 0 0 0px transparent; }
  50% { box-shadow: 0 0 15px #00ffcc; }
  100% { box-shadow: 0 0 0px transparent; }
}
</style>

</head>

<body>

<div style="display:flex; align-items:center; background-color:#7191F9; width:1250px; height:45px; margin-left:8px; margin-top: -8px;">

  <div style="color:white; margin-left:10px; width:200px;">
    <div style="font-size:14px;">Level <span id="level">1</span></div>
    
    <div style="background:#ccc; width:180px; height:8px; border-radius:5px;">
      <div id="xpBar" style="background:#00ffcc; height:8px; width:0%; border-radius:5px;"></div>
    </div>

    <div style="font-size:10px;">
      <span id="xp">0</span> / <span id="xpNeeded">100</span> XP
    </div>
  </div>

 <a href="Life App Home Blue Dark.html"  style="text-decoration:none;">
  <h1 style="flex-grow:1; text-align:center; color:#fff; font-size:30px; margin:0;font-weight: normal; margin-left: 349px; margin-right: 348px">
    LifeSync 
  </h1>
</a>

  <div style="display:flex; gap:20px; margin-right:15px; margin-top: 4px;">
    <a href="Life App Blue Account Dark.html"><img src="Cole profile pic.jpg" style="width:38px; height:30px;"></a>
    <a href="Life App Colour Pick Dark.html"><img src="Colour Dark.png" style="width:38px; height:30px;"></a>
    <a href="Life App Blue Weekly Calendar.html"><img src="Light Mode.png" style="width:38px; height:36px; margin-top: -2px"></a>
  </div>
</div>

<div class="row2" style="margin-top:20px; width:1250px; height:440px; margin-left:5px; background-color:#7191F9;">
<h2 style="text-align:left; color:#fff; margin-right:80px; margin-top:5px; font-weight: normal">Weekly Calendar</h2>

<div class="controls">

<input id="taskInput" placeholder="Write on board..." style="color:#7191F9">

<select id="daySelect" style="color:#7191F9">
<option value="0">Monday</option>
<option value="1">Tuesday</option>
<option value="2">Wednesday</option>
<option value="3">Thursday</option>
<option value="4">Friday</option>
<option value="5">Saturday</option>
<option value="6">Sunday</option>
</select>

<button onclick="addTask()" style="color:#7191F9;font-weight:600;border-radius:4px;">Add</button>

</div>

</div>

<div class="calendar" id="calendar"></div>

<script src="XP.js"></script>

<script>

function celebrate(message) {
  const old = document.querySelector(".celebration");
  if (old) old.remove();

  const pop = document.createElement("div");
  pop.className = "celebration";
  pop.textContent = message;
  document.body.appendChild(pop);

  setTimeout(() => pop.remove(), 2500);

  for (let i = 0; i < 15; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;
    c.style.animationDuration = (1.5 + Math.random()) + "s";
    document.body.appendChild(c);

    setTimeout(() => c.remove(), 2000);
  }
}
function notify(message) {
  const old = document.querySelector(".celebration");
  if (old) old.remove();

  const pop = document.createElement("div");
  pop.className = "celebration";
  pop.textContent = message;
  document.body.appendChild(pop);

  setTimeout(() => pop.remove(), 2500);
}

let days = ["MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY","SUNDAY"]

let data = JSON.parse(localStorage.getItem("weeklyTasks")) || [[],[],[],[],[],[],[]]

function render(){

let calendar = document.getElementById("calendar")
calendar.innerHTML = ""

for(let row=0; row<6; row++){

for(let col=0; col<7; col++){

let cell = document.createElement("div")
cell.className = "cell"

let label = row === 0 ? `<div class="day-label">${days[col]}</div>` : ""

let taskHTML = ""
if(data[col][row]){
taskHTML = `
<div class="task">
<span>${data[col][row]}</span>
<button onclick="removeTask(${col}, ${row})">x</button>
</div>
`
}

cell.innerHTML = label + taskHTML

calendar.appendChild(cell)

}

}

}

function addTask(){

let task = document.getElementById("taskInput").value
let day = document.getElementById("daySelect").value

if(task === "") return

if(data[day].length < 6){
data[day].push(task)

addXP(10, "Task Planned 📅")

if(data[day].length === 1){
  addXP(5) 
  notify ("Day Started ✅")
}

if(data[day].length === 3){
  addXP(10) 
  notify ("Productive Day ⚡")
}

if(data[day].length === 5){
  addXP(20)
  celebrate ("🏆Fully Booked Day 🔥")
}

}

save()
render()
checkWeeklyMilestones()

document.getElementById("taskInput").value = ""

}

function removeTask(day, index){

data[day].splice(index,1)

addXP(5) 
notify ("Task Completed ✅")

save()
render()

}

function save(){
localStorage.setItem("weeklyTasks", JSON.stringify(data))
}

render()

function checkWeeklyMilestones(){

let activeDays = 0
let totalTasks = 0

data.forEach(day => {
  if(day.length > 0){
    activeDays++
    totalTasks += day.length
  }
})

if(activeDays === 3){
  addXP(10) 
  notify ("Building Routine 🔄")
}

if(activeDays === 5){
  addXP(30) 
  celebrate ("🏆Consistent Week 📆")
}

if(activeDays === 7){
  addXP(70)
  celebrate ("🏆Perfect Week 🔥")
}

if(totalTasks === 10){
  addXP(30, "Well Planned 🧠")
}

if(totalTasks === 20){
  addXP(50) 
  celebrate ("🏆Highly Organised 💼")
}

if(totalTasks === 30){
  addXP(100) 
  celebrate ("👑Elite Planner 🚀")
}

}

function hasWeeklyReset(){
  return localStorage.getItem(sk('weekly_reset')) === 'true';
}

function setWeeklyReset(){
  localStorage.setItem(sk('weekly_reset'), 'true');
}

function checkWeeklyReset(){
  if(!hasWeeklyReset()){
    addXP(10);
    notify("Attack the week");
    setWeeklyReset();
  }
}

checkWeeklyReset();
</script>

</body>
</html>
