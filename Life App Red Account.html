<script src="XP.js"></script>
<script>
function getAchievements() {
  const trophyList = [
    { key: 'trophy_perfectDay', label: '🏆 Perfect Day' },
    { key: 'trophy_perfectDayMax', label: '👑 Perfect Day Max' },
    { key: 'trophy_5Extra', label: '🏆 5 Extra' },
    { key: 'trophy_7Extra', label: '🏆 7 Extra' },
    { key: 'trophy_10Extra', label: '👑 10 Extra' },
    { key: 'trophy_15Extra', label: '👑 15 Extra' },
    { key: 'trophy_20Extra', label: '👑 Extra Max' },
    { key: 'trophy_transactionNovice', label: '🏆 Transaction Novice' },
    { key: 'trophy_transactionMaster', label: '👑 Transaction Master' },
    { key: 'trophy_transactionKing', label: '👑 Transaction King' },
    { key: 'trophy_strongSavings', label: '🏆 Strong Savings' },
    { key: 'trophy_moneyMaster', label: '👑 Money Master' },
    { key: 'trophy_calendarNovice', label: '🏆 Calendar Novice' },
    { key: 'trophy_calendarKing', label: '👑 Calendar King' },
    { key: 'trophy_fullCalendar', label: '🏆 Full Calendar' },
    { key: 'trophy_perfectWeek', label: '🏆 Perfect Week' },
    { key: 'trophy_creativeMind', label: '🏆 Creative Mind' },
  ];
  return trophyList.filter(t => localStorage.getItem(t.key) === 'true');
}

function updateProfileAndAchievements() {
  const level = localStorage.getItem('level') || 1;
  const xp = localStorage.getItem('xp') || 0;
  let xpNeeded = 100;
  try {
    xpNeeded = typeof xpNeeded === 'function' ? xpNeeded() : (localStorage.getItem('xpNeeded') || 100);
  } catch (e) {
    xpNeeded = 1200;
  }
  if (document.getElementById('profileLevel'))
    document.getElementById('profileLevel').textContent = `Level ${level}`;
  if (document.getElementById('statXP'))
    document.getElementById('statXP').textContent = `${xp} / ${xpNeeded}`;
  if (document.getElementById('level'))
    document.getElementById('level').textContent = level;
  if (document.getElementById('xp'))
    document.getElementById('xp').textContent = xp;
  if (document.getElementById('xpNeeded'))
    document.getElementById('xpNeeded').textContent = xpNeeded;
  if (document.getElementById('xpBar'))
    document.getElementById('xpBar').style.width = Math.min(100, (xp / xpNeeded) * 100) + '%';

  const achievementsCard = Array.from(document.querySelectorAll('.card h3')).find(h => h.textContent === 'Achievements')?.parentElement;
  if (achievementsCard) {
    Array.from(achievementsCard.querySelectorAll('p')).forEach(p => p.remove());
    const unlocked = getAchievements();
    if (unlocked.length === 0) {
      const p = document.createElement('p');
      p.textContent = 'No achievements yet.';
      achievementsCard.appendChild(p);
    } else {
      unlocked.forEach(t => {
        const p = document.createElement('p');
        p.textContent = t.label;
        achievementsCard.appendChild(p);
      });
    }
  }
}

document.addEventListener('DOMContentLoaded', updateProfileAndAchievements);
</script>
