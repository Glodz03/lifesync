<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f0f0f0;
}


.row {
display: flex;
flex-direction: row;
justify-content: center;
align-items: flex-start;
}

.row2 {
display: flex;
flex-direction: row;
justify-content: center;
align-items: flex-start;
gap: 30px;
}

.controls {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-top: 8px;
}

.controls input, .controls select {
  padding: 6px;
  border-radius: 5px;
  border: none;
}

.controls button {
  padding: 7px 10px;
  border: none;
  background: white;
  color: #1D49D7;
  font-weight: bold;
  border-radius: 5px;
  cursor: pointer;
}

.board-container {
  position: relative;
  height: calc(90vh - 70px);
  background: white;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

#notesLayer {
  position: absolute;
  width: 100%;
  height: 100%;
}

.note {
  position: absolute;
  background: #1D49D7;
  color: #fff;
  padding: 10px;
  border-radius: 8px;
  cursor: move;
  width: 140px;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
}
.celebration {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #00ffcc;
  color: #000;
  padding: 12px 18px;
  border-radius: 8px;
  font-weight: bold;
  box-shadow: 0 0 15px rgba(0,255,200,0.7);
  animation: popIn 1s ease, fadeOut 1s ease 3.5s forwards;
  z-index: 9999;
}

@keyframes popIn {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes fadeOut {
  to { opacity: 0; transform: translateY(-20px); }
}

.confetti {
  position: fixed;
  width: 9px;
  height: 9px;
  background: red;
  top: 0;
  animation: fall 8s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
    opacity: 0;
  }
}
.task-complete {
  animation: glow 0.5s ease;
}

@keyframes glow {
  0% { box-shadow: 0 0 0px transparent; }
  50% { box-shadow: 0 0 15px #00ffcc; }
  100% { box-shadow: 0 0 0px transparent; }
}
</style>
</head>

<body>

<div style="display:flex; align-items:center; background-color:#1D49D7; width:1250px; height:45px; margin-left:15px;">

  <div style="color:white; margin-left:10px; width:200px;">
    <div style="font-size:14px;">Level <span id="level">1</span></div>
    
    <div style="background:#ccc; width:180px; height:8px; border-radius:5px;">
      <div id="xpBar" style="background:#00ffcc; height:8px; width:0%; border-radius:5px;"></div>
    </div>

    <div style="font-size:10px;">
      <span id="xp">0</span> / <span id="xpNeeded">100</span> XP
    </div>
  </div>

 <a href="Life App Home Blue.html"  style="text-decoration:none;">
  <h1 style="flex-grow:1; text-align:center; color:#fff; font-size:30px; margin:0;font-weight: normal; margin-left: 349px; margin-right: 350px">
    LifeSync 
  </h1>
</a>

  <div style="display:flex; gap:20px; margin-right:15px; margin-top: 4px;">
    <a href="Life App Blue Account.html"><img src="Cole profile pic.jpg" style="width:38px; height:30px;"></a>
    <a href="Life App Colour Pick.html"><img src="Colour.png" style="width:38px; height:30px;"></a>
    <a href="Life App Blue Whiteboard Dark.html"><img src="Moon.png" style="width:30px; height:30px; margin-top: 1px"></a>
  </div>
</div>
<div class="row2" style="margin-top:20px; width:1250px; height:50px; margin-left:12px; background-color:#1D49D7;">
<h2 style="text-align:left; color:#fff; margin-right:80px; margin-top:8px; font-weight: normal;">Whiteboard</h2>

  <div class="controls">

    <input type="text" id="noteInput" placeholder="Note..." style="color: #1D49D7">
    <button onclick="addNote()">Add</button>

    <button onclick="clearBoard()">Clear</button>
  </div>
</div>

<div class="board-container">
  <canvas id="canvas"></canvas>
  <div id="notesLayer"></div>
</div>

<script src="XP.js"></script>

<script>

function celebrate(message) {
  const old = document.querySelector(".celebration");
  if (old) old.remove();

  const pop = document.createElement("div");
  pop.className = "celebration";
  pop.textContent = message;
  document.body.appendChild(pop);

  setTimeout(() => pop.remove(), 2500);

  for (let i = 0; i < 15; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;
    c.style.animationDuration = (1.5 + Math.random()) + "s";
    document.body.appendChild(c);

    setTimeout(() => c.remove(), 2000);
  }
}
function notify(message) {
  const old = document.querySelector(".celebration");
  if (old) old.remove();

  const pop = document.createElement("div");
  pop.className = "celebration";
  pop.textContent = message;
  document.body.appendChild(pop);

  setTimeout(() => pop.remove(), 2500);
}

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

resizeCanvas();

/* RESIZE */
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 70;
  loadBoard();
}

window.addEventListener("resize", resizeCanvas);

canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => {
  drawing = false;
  ctx.beginPath();
  saveBoard();
});
canvas.addEventListener("mousemove", draw);

let drawing = false;

function setTool(t) {
  tool = t;
}

function clearBoard() {
  addXP(20, "Board Cleared");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById("notesLayer").innerHTML = "";
  localStorage.removeItem("whiteboard");
  localStorage.removeItem("notes");
}

function saveBoard() {
  localStorage.setItem("whiteboard", canvas.toDataURL());
  localStorage.setItem("notes", document.getElementById("notesLayer").innerHTML);
}

function loadBoard() {
  const data = localStorage.getItem("whiteboard");
  if (data) {
    const img = new Image();
    img.src = data;
    img.onload = () => ctx.drawImage(img, 0, 0);
  }

  document.getElementById("notesLayer").innerHTML = localStorage.getItem("notes") || "";

  document.querySelectorAll(".note").forEach(makeDraggable);
}

function addNote() {
  addXP(15, "Note Added 🗒️");
checkWhiteboardMilestones();
  const input = document.getElementById("noteInput");
  const text = input.value;

  if (!text) return;

  const note = document.createElement("div");
  note.className = "note";
  note.innerText = text;

  note.style.top = "100px";
  note.style.left = "100px";

  makeDraggable(note);

  document.getElementById("notesLayer").appendChild(note);
  input.value = "";

  saveBoard();
}

function makeDraggable(el) {
  let offsetX, offsetY, isDragging = false;

  el.addEventListener("mousedown", (e) => {
    isDragging = true;
    offsetX = e.offsetX;
    offsetY = e.offsetY;
  });

  document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    el.style.left = (e.clientX - offsetX) + "px";
    el.style.top = (e.clientY - offsetY - 70) + "px";
  });

document.addEventListener("mouseup", () => {
  if (isDragging) {
    saveBoard();
    addXP(3, "Organising Ideas 🧠");
  }
  isDragging = false;
});
}

loadBoard();

let sessionXPgiven = false;

setTimeout(() => {
  if (!sessionXPgiven) {
    addXP(20, "Focused Session 🎯");
    sessionXPgiven = true;
  }
}, 60000);

setTimeout(() => {
  if (!sessionXPgiven) {
    addXP(20, "Well done 🎯");
    sessionXPgiven = true;
  }
}, 300000);

setTimeout(() => {
  if (!sessionXPgiven) {
    addXP(50)
    celebrate("🏆Chief in Organisation");
    localStorage.setItem('trophy_chiefOrganisation', 'true');
    sessionXPgiven = true;
  }
}, 600000);

function checkWhiteboardMilestones() {
  let notes = document.querySelectorAll(".note").length;

  if (notes === 2) {
    addXP(10);
    celebrate("Ideas Flowing 💡");
  }

  if (notes === 4) {
    addXP(40);
    celebrate("🏆Creative Mind");
    localStorage.setItem('trophy_creativeMind', 'true');
  }

  if (notes === 9) {
    addXP(100);
    celebrate("👑Idea Machine");
    localStorage.setItem('trophy_ideaMachine', 'true');
  }
}
</script>

</body>
</html>
